# Template — fill in the blanks and apply; do NOT commit populated values.
# Per Rule 11.2, the real manifest is gitignored (k8s/langfuse-secrets.yaml).
# Generate values with:
#   openssl rand -base64 32    # salt, nextauth-secret, DB passwords
#   openssl rand -hex   32     # encryption-key (exactly 32 bytes hex)
#   openssl rand -hex   12     # accessKeyId for MinIO
# Then:
#   kubectl -n langfuse apply -f k8s/langfuse-secrets.yaml

---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-app-secrets
  namespace: langfuse
type: Opaque
stringData:
  salt: ""            # openssl rand -base64 32
  nextauth-secret: "" # openssl rand -base64 32
  encryption-key: ""  # openssl rand -hex 32  (must be exactly 64 hex chars)

---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-postgres-secret
  namespace: langfuse
type: Opaque
stringData:
  # Bitnami Postgres chart reads key `postgres-password`.
  postgres-password: ""
  # Langfuse prisma reads key `password`.
  password: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-clickhouse-secret
  namespace: langfuse
type: Opaque
stringData:
  password: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-redis-secret
  namespace: langfuse
type: Opaque
stringData:
  password: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-s3-secret
  namespace: langfuse
type: Opaque
stringData:
  # MinIO root user == Langfuse S3 accessKeyId
  accessKeyId: ""          # openssl rand -hex 12
  # Same value as MinIO root password — chart wires rootPasswordSecretKey: secretAccessKey
  secretAccessKey: ""
  # Legacy slot kept for backwards compat; real used key is secretAccessKey above.
  rootPassword: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-init-secrets
  namespace: langfuse
type: Opaque
stringData:
  # Headless init admin credentials (LANGFUSE_INIT_USER_EMAIL / _PASSWORD).
  admin-email: "admin@elkogroup.local"
  admin-password: ""         # openssl rand -base64 24 | tr -d '+/=' | head -c 32
  # Pre-minted project API keys (LANGFUSE_INIT_PROJECT_{PUBLIC,SECRET}_KEY)
  public-key: "pk-lf-$(uuidgen)"
  secret-key: "sk-lf-$(uuidgen)"
